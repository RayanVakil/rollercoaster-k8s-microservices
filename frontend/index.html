<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RollerCoasterPark</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <header class="glass-nav">
        <div class="nav-content">
            <h1 class="logo">RollerCoaster<span>Park</span></h1>
            <nav>
                <a href="#" class="active">Attractions</a>
                <a href="#">Tickets</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h2>Experience the Thrill</h2>
            <p>Discover our world-class attractions and book your next adventure.</p>
        </section>

        <section class="attractions-section">
            <div class="section-header">
                <h3>Our Attractions</h3>
                <div class="action-buttons">
                    <button id="buy-ticket-btn" class="btn-secondary">Buy Ticket</button>
                    <button id="refresh-btn" class="btn-primary">Refresh</button>
                </div>
            </div>
            
            <div id="loading" class="loading">Loading thrills...</div>
            <div id="error-message" class="error hidden">Failed to load attractions. Please try again.</div>
            
            <div id="attractions-grid" class="grid hidden">
                <!-- Javascript will populate this -->
            </div>
        </section>
    </main>

    <!-- Ticket Purchase Modal -->
    <div id="ticket-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <span class="close-btn">&times;</span>
            <h2>Purchase Ticket</h2>
            <form id="ticket-form">
                <div class="form-group">
                    <label for="customerId">Customer ID</label>
                    <input type="number" id="customerId" required placeholder="e.g. 1">
                </div>
                <div class="form-group">
                    <label for="accessLevel">Access Level</label>
                    <select id="accessLevel">
                        <option value="1">Standard (1)</option>
                        <option value="2">VIP (2)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="startDate">Start Date (MM-dd-yyyy HH:mm)</label>
                    <input type="text" id="startDate" required placeholder="07-04-2026 10:00">
                </div>
                <div class="form-group">
                    <label for="endDate">End Date (MM-dd-yyyy HH:mm)</label>
                    <input type="text" id="endDate" required placeholder="07-04-2026 22:00">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Confirm Purchase</button>
                <div id="form-status" class="status-msg"></div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
