name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run Maven Tests
        run: |
          cd Coaster_customer && mvn test
          cd ../Coaster_manager && mvn test

      - name: Build and push Coaster Manager
        uses: docker/build-push-action@v4
        with:
          context: ./Coaster_manager
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/coaster-manager:latest

      - name: Build and push Coaster Customer
        uses: docker/build-push-action@v4
        with:
          context: ./Coaster_customer
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/coaster-customer:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/coaster-frontend:latest
